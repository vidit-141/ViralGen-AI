services:
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - static_files:/app/static
    env_file:
      - .env
    depends_on:
      - redis
    restart: always
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: ./backend
    command: celery -A app.celery_app.celery worker --loglevel=info --concurrency=4
    volumes:
      - static_files:/app/static
    env_file:
      - .env
    depends_on:
      - redis
    restart: always
    dns:
      - 8.8.8.8
      - 8.8.4.4

volumes:
  redis_data:
  static_files:
  